<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="initial-scale=1.0, user-scalable=no" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <title>Hello, World</title>
  <style type="text/css">
    html {
      height: 100%
    }
    body {
      height: 100%;
      margin: 0px;
      padding: 0px
    }
    #container {
      height: 100%
    }
  </style>
  <script type="text/javascript" src="https://api.map.baidu.com/api?v=1.0&type=webgl&ak=c6S9S2EcuQH6xx3MwV9mZ2owkzfb1jRi">
  </script>
</head>
<body>
  <div id="container"></div>
  <script type="text/javascript">
    var map = new BMapGL.Map("container");
    var point = new BMapGL.Point(116.404, 39.915);
    map.centerAndZoom(point, 15);
    map.enableScrollWheelZoom(true);

    var hospitalMarkers = [];
    var hospitalLabels = [];
    var hospitalData = [];

    function clearMarkers() {
      for (var i = 0; i < hospitalMarkers.length; i++) map.removeOverlay(hospitalMarkers[i]);
      for (var i = 0; i < hospitalLabels.length; i++) map.removeOverlay(hospitalLabels[i]);
      hospitalMarkers = [];
      hospitalLabels = [];
      hospitalData = [];
    }

    function searchHospitals(region) {
      clearMarkers();

      var local = new BMapGL.LocalSearch(map, {
        onSearchComplete: function (results) {
          if (local.getStatus() === BMAP_STATUS_SUCCESS) {
            var pois = [];
            for (var i = 0; i < results.getCurrentNumPois(); i++) {
              pois.push(results.getPoi(i));
            }
            if (pois.length > 0) {
              map.setViewport(pois.map(function (p) { return p.point; }));
            }
            for (var i = 0; i < pois.length; i++) {
              (function (poi) {
                hospitalData.push({
                  name: poi.title,
                  address: poi.address,
                  lat: poi.point.lat,
                  lng: poi.point.lng
                });
                var marker = new BMapGL.Marker(poi.point);
                map.addOverlay(marker);
                hospitalMarkers.push(marker);

                marker.addEventListener("click", function () {
                  var win = new BMapGL.InfoWindow(
                    "<b>" + poi.title + "</b><br/>地址: " + (poi.address || "未知"),
                    { width: 260, title: "医院详情" }
                  );
                  map.openInfoWindow(win, poi.point);
                });

                var label = new BMapGL.Label(poi.title, {
                  position: poi.point,
                  offset: new BMapGL.Size(20, -10)
                });
                label.setStyle({
                  color: "#333",
                  fontSize: "12px",
                  backgroundColor: "rgba(255,255,255,0.85)",
                  border: "1px solid #999",
                  padding: "2px 6px",
                  whiteSpace: "nowrap"
                });
                map.addOverlay(label);
                hospitalLabels.push(label);
              })(pois[i]);
            }
          }
        }
      });
      local.search(region + " 医院");
    }
  </script>
</body>
</html>
